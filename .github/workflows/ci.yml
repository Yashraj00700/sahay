name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run type-check
        run: npm run type-check

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run format:check
        run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run build
        run: npm run build

  no-secrets:
    name: No Leaked Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scan repository for secret patterns
        # Primary scan: the dedicated bash script (matches AKIA, sk-ant-,
        # sk-, JWT-shaped tokens, inline passwords, PEM private keys).
        # See scripts/check-secrets.sh for pattern details.
        run: bash scripts/check-secrets.sh
      - name: Fallback scan for legacy demo tokens
        # Belt-and-braces: even if the primary scanner misses something, the
        # original known-bad tokens stay forbidden.
        run: |
          set -e
          PATTERNS='admin@rasluxuryoils\.com|demo-secret|change-me-to-a-32-char|Bearer eyJ'
          EXCLUDES=(
            --exclude-dir=node_modules
            --exclude-dir=.git
            --exclude-dir=dist
            --exclude-dir=build
            --exclude-dir=.next
            --exclude-dir=.turbo
            --exclude-dir=test
            --exclude-dir=tests
            --exclude-dir=__tests__
            --exclude-dir=__fixtures__
            --exclude=SECRETS.md
            --exclude=check-secrets.sh
          )
          if grep -rEn "${EXCLUDES[@]}" "$PATTERNS" .; then
            echo "::error::Found banned demo/leaked tokens in source. Remove them or move to an excluded test/fixture directory."
            exit 1
          else
            echo "No banned tokens detected."
          fi

  migrate-check:
    name: DB Migration Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Drizzle migrations check
        working-directory: packages/db
        run: npx --no-install drizzle-kit check || echo "no migrations yet"
