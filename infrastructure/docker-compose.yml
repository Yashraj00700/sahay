version: '3.9'

# Local development infrastructure for Sahay.
#
# Production targets: Neon (Postgres + pgvector) and Upstash (Redis HTTP API).
# This file exists only to give developers a convenient local Postgres so
# they can run migrations and tests without provisioning Neon. Redis was
# removed because BullMQ/Socket.io were replaced by Inngest/Pusher; Upstash
# is HTTP-based and works fine against the production endpoint from a dev
# laptop without any local server.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sahay_postgres
    environment:
      POSTGRES_DB: sahay_dev
      POSTGRES_USER: sahay
      POSTGRES_PASSWORD: sahaydev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahay -d sahay_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sahay_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@sahay.ai
      PGADMIN_DEFAULT_PASSWORD: sahaydev123
    ports:
      - "8082:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
