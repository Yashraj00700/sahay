version: '3.9'

services:
  # ─── PostgreSQL 16 with pgvector extension ─────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sahay_postgres
    environment:
      POSTGRES_DB: sahay_dev
      POSTGRES_USER: sahay
      POSTGRES_PASSWORD: sahaydev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahay -d sahay_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis 7 (for caching + BullMQ queues + Socket.io) ─────
  redis:
    image: redis:7-alpine
    container_name: sahay_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis Commander (web UI for Redis — dev only) ──────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sahay_redis_ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - tools

  # ─── pgAdmin (web UI for Postgres — dev only) ───────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sahay_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@sahay.ai
      PGADMIN_DEFAULT_PASSWORD: sahaydev123
    ports:
      - "8082:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
